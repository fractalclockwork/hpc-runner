services:
  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uv run streamlit run src/ui/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    # No host port mapping - Playwright connects via internal network (streamlit:8501)
    volumes:
      - ../data:/app/data

  playwright:
    build:
      context: ..
      dockerfile: docker/Dockerfile.playwright
    depends_on:
      - streamlit
    environment:
      STREAMLIT_URL: http://streamlit:8501
    command: >
      sh -c "sleep 8 && uv run pytest src/ui/tests/e2e -v --browser chromium"
