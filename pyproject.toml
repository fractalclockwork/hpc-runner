[project]
name = "dow-workspace"
version = "0.0.0"
requires-python = ">=3.10"
dependencies = [
    "structlog>=25.5.0",
    "hpc_regression",
    "basic_restapi",
    "gantt_tool",
]

[tool.uv.workspace]
members = [
  "prototypes/hpc-runner",
  "prototypes/basic_restapi",
  "utils/gantt-tool",
]

[tool.uv.sources]
hpc_regression = { workspace = true }
basic_restapi = { workspace = true }
gantt_tool = { workspace = true }

[dependency-groups]
dev = ["pytest", "ruff", "pyyaml"]

