<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPC Regression Testing Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
        .layout { display: flex; min-height: 100vh; }
        aside { width: 220px; background: #1e293b; padding: 1.5rem; border-right: 1px solid #334155; }
        main { flex: 1; padding: 2rem; overflow-auto; }
        nav button { display: block; width: 100%; text-align: left; padding: 0.75rem 1rem; margin-bottom: 0.25rem;
            background: transparent; border: none; color: #94a3b8; cursor: pointer; border-radius: 6px;
            font-size: 0.9rem; }
        nav button:hover { background: #334155; color: #fff; }
        nav button.active { background: #0ea5e9; color: #fff; }
        h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
        .muted { color: #94a3b8; font-size: 0.9rem; }
        .card { background: #1e293b; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #334155; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: #0ea5e9; color: #fff; }
        .btn-primary:hover { background: #0284c7; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
        .badge-pass { background: #065f46; color: #6ee7b7; }
        .badge-fail { background: #7f1d1d; color: #fca5a5; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-weight: 500; }
        #chart-container { max-width: 600px; height: 300px; margin-top: 1rem; }
        .loading { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="layout">
        <aside>
            <div style="margin-bottom: 1.5rem;">
                <strong>HPC Regression</strong>
                <p class="muted" style="margin: 0.25rem 0 0;">Platform</p>
            </div>
            <nav>
                <button class="active" data-view="runs">Test Runs</button>
                <button data-view="solvers">Solvers</button>
                <button data-view="trends">Performance Trends</button>
            </nav>
            <p class="muted" style="font-size: 0.75rem; margin-top: 2rem;">DOW-1-26 · MVP</p>
        </aside>
        <main>
            <div id="view-runs">
                <h1>Test Runs</h1>
                <p class="muted">Recent runs and results. Click "Run All Tests" to execute.</p>
                <div class="card">
                    <button class="btn btn-primary" id="btn-run-tests">Run All Tests</button>
                    <span class="loading" id="run-status" style="margin-left: 1rem;"></span>
                </div>
                <div class="card">
                    <table>
                        <thead><tr><th>ID</th><th>Test</th><th>Solver</th><th>System</th><th>Status</th><th>Runtime</th><th>Time</th></tr></thead>
                        <tbody id="runs-tbody"></tbody>
                    </table>
                </div>
            </div>
            <div id="view-solvers" style="display:none;">
                <h1>Solvers</h1>
                <p class="muted">Configured scientific solvers for regression testing.</p>
                <div class="grid" id="solvers-grid"></div>
            </div>
            <div id="view-trends" style="display:none;">
                <h1>Performance Trends</h1>
                <p class="muted">Historical metric values for drift detection.</p>
                <div class="card">
                    <label>Solver: <select id="trend-solver"></select></label>
                    <label style="margin-left: 1rem;">Metric: <select id="trend-metric"></select></label>
                    <button class="btn btn-primary" id="btn-load-trend" style="margin-left: 1rem;">Load</button>
                </div>
                <div class="card">
                    <div id="chart-container"><canvas id="trend-chart"></canvas></div>
                </div>
            </div>
        </main>
    </div>
    <script>
        const API = '';
        async function fetchJson(url) {
            const r = await fetch(API + url);
            if (!r.ok) throw new Error(r.statusText);
            return r.json();
        }

        document.querySelectorAll('nav button').forEach(b => {
            b.onclick = () => {
                document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                document.getElementById('view-runs').style.display = b.dataset.view === 'runs' ? 'block' : 'none';
                document.getElementById('view-solvers').style.display = b.dataset.view === 'solvers' ? 'block' : 'none';
                document.getElementById('view-trends').style.display = b.dataset.view === 'trends' ? 'block' : 'none';
                if (b.dataset.view === 'solvers') loadSolvers();
                if (b.dataset.view === 'trends') initTrends();
            };
        });

        async function loadRuns() {
            const tbody = document.getElementById('runs-tbody');
            tbody.innerHTML = '<tr><td colspan="7" class="loading">Loading...</td></tr>';
            try {
                const runs = await fetchJson('/api/runs');
                tbody.innerHTML = runs.length === 0
                    ? '<tr><td colspan="7">No runs yet. Click "Run All Tests" to start.</td></tr>'
                    : runs.map(r => `<tr>
                        <td>${r.id}</td>
                        <td>${r.test_name}</td>
                        <td>${r.solver_name}</td>
                        <td>${r.system_name}</td>
                        <td><span class="badge ${r.passed ? 'badge-pass' : 'badge-fail'}">${r.passed ? 'PASS' : 'FAIL'}</span></td>
                        <td>${r.runtime_seconds?.toFixed(2) || '-'}s</td>
                        <td>${r.timestamp ? new Date(r.timestamp).toLocaleString() : '-'}</td>
                    </tr>`).join('');
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="7" style="color:#f87171">Error: ' + e.message + '</td></tr>';
            }
        }

        document.getElementById('btn-run-tests').onclick = async () => {
            const status = document.getElementById('run-status');
            status.textContent = 'Running...';
            try {
                await fetch(API + '/api/run_tests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
                status.textContent = 'Done.';
                loadRuns();
            } catch (e) {
                status.textContent = 'Error: ' + e.message;
            }
            setTimeout(() => status.textContent = '', 3000);
        };

        async function loadSolvers() {
            const grid = document.getElementById('solvers-grid');
            grid.innerHTML = '<span class="loading">Loading...</span>';
            try {
                const solvers = await fetchJson('/api/solvers');
                grid.innerHTML = solvers.map(s => `
                    <div class="card">
                        <strong>${s.name}</strong> <span class="muted">v${s.version}</span>
                        <p class="muted" style="margin: 0.5rem 0;">Systems: ${(s.allowed_systems || []).join(', ') || '-'}</p>
                        <p class="muted" style="font-size: 0.85rem;">Parser: ${s.has_parser ? 'Yes' : 'No'}</p>
                    </div>
                `).join('');
            } catch (e) {
                grid.innerHTML = '<span style="color:#f87171">Error: ' + e.message + '</span>';
            }
        }

        let trendChart = null;
        function initTrends() {
            fetchJson('/api/solvers').then(solvers => {
                const sel = document.getElementById('trend-solver');
                sel.innerHTML = solvers.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
                document.getElementById('trend-metric').innerHTML = '<option value="mlups">mlups</option><option value="runtime_seconds">runtime_seconds</option>';
            });
        }
        document.getElementById('btn-load-trend').onclick = async () => {
            const solver = document.getElementById('trend-solver').value;
            const metric = document.getElementById('trend-metric').value;
            const data = await fetchJson(`/api/metrics/${solver}/${metric}`);
            const ctx = document.getElementById('trend-chart').getContext('2d');
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => new Date(d.timestamp).toLocaleString()),
                    datasets: [{ label: metric, data: data.map(d => d.value), borderColor: '#0ea5e9', fill: false }]
                },
                options: { responsive: true }
            });
        };

        loadRuns();
    </script>
</body>
</html>
