systems:
  - name: dev-system
    resources: [dev-local]
    env: {}
  - name: hpc-cluster-01
    resources: [hpc-node]
    env:
      MODULEPATH: /opt/modules
  # SLURM + LAMMPS (see docs/slurm_lammps_e2e.md). Env vars are merged into solver subprocess.
  - name: sci-slurm-lammps
    resources: [slurm-lammps]
    # Set DOCKER_SLURM_CONTAINER / LAMMPS_BIN in the shell or here when needed (see docs/slurm_lammps_e2e.md)
    env: {}
