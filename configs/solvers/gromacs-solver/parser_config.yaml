patterns:
  - name: Total mass
    regex: 'Total mass \s*([\d.e+-]+)'
    type: float
  - name: runtime_seconds
    regex: 'runtime_seconds:\s*([\d.]+)'
    type: float
  # potential_energy_kj_mol: not reported in a form we parse for the GROMACS version under test (e.g. Docker 2022.2).
  #- name: potential_energy_kj_mol
  #  regex: 'Potential\n.*?([-\d.e+]+)\s*$'
  #  type: float
  - name: n_atoms
    regex: '\s*(\d+) atoms'
    type: int
