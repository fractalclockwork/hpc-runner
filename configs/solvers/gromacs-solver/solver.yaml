name: gromacs-solver
version: "1.0.0"
entrypoint: run.sh
allowed_systems: [gromacs-docker]
default_system: gromacs-docker
parser_config: parser_config.yaml
metrics:
  - name: Total mass
    unit: amu
    min: 1
    required: true
  - name: runtime_seconds
    unit: s
    required: true
  - name: potential_energy_kj_mol
    unit: kJ/mol
    required: true
  - name: n_atoms
    unit: count
    required: true
log_names: [stdout]
