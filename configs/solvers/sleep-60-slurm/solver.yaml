name: sleep-60-slurm
version: "0.1.0"
entrypoint: run.sh
allowed_systems: [sci-slurm-lammps]
default_system: sci-slurm-lammps
metrics:
  # runtime_seconds comes from HARNESS_SOLVER_WALL_SECONDS or sacct after refine (see run.sh / sbatch template).
  # Target window ~[60, 61) seconds of workload wall time; bounds are inclusive (min/max) in validate_metrics.
- name: runtime_seconds
  unit: s
  min: 60
  max: 61
  required: true
log_names: []
timeout_seconds: 600
