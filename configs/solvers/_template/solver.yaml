# Solver definition template
# Copy this directory to configs/solvers/<your-solver-name>/ and customize

# Required: solver identifier (should match directory name)
name: my-solver

# Required: script to execute (run.sh, run.py, etc.)
entrypoint: run.sh

# Required: list of system names this solver can run on
allowed_systems: [dev-system]

# Optional: version string (default 0.0.0)
version: "0.0.0"

# Optional: path to parser config for metric extraction
# parser_config: parser_config.yaml

# Optional: expected metrics and validation ranges
# metrics:
#   - name: mlups
#     unit: MLUPS
#     min: 0
#     max: null
#     required: true
#   - name: runtime_seconds
#     unit: s
#     required: true

# Optional: expected log file names
# log_names: [stdout, stderr]

# Optional: working directory for the solver script
#   cwd: true   (default) - use solver directory as cwd
#   cwd: /path  - use explicit path as cwd
#   cwd: false  - use entrypoint script's parent directory as cwd
# cwd: true

# Optional: env vars merged into the solver process (resource env, then solver env, then system env)
# env:
#   MY_VAR: default-value
