name: openmm-solver
version: "1.0.0"
entrypoint: run.sh
# Defaults for simulate.py and run.sh (sbatch); system env overrides per deployment.
env:
  INPUT_PDB: inputs/alanine_dipeptide.pdb
  N_STEPS: "2000"
  SOLVATE: "false"
  SLURM_PARTITION: gpu
  SLURM_GPUS: "1"
  SLURM_NTASKS: "8"
  SLURM_TIME: "01:00:00"
allowed_systems: [dev-system]
default_system: dev-system
parser_config: parser_config.yaml
metrics:
  - name: ns_per_day
    unit: ns/day
    min: 0
    required: true
  - name: runtime_seconds
    unit: s
    required: true
  - name: potential_energy_kj_mol
    unit: kJ/mol
    required: true
  - name: n_atoms
    unit: count
    required: true
log_names: [stdout]
