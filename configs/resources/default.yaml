resources:
  - name: dev-local
    cpus: 4
    memory_gb: 8
  - name: hpc-node
    cpus: 24
    gpus: 4
    memory_gb: 196
    env:
      MODULEPATH: /opt/modules
  # Documented capacity for SLURM+LAMMPS jobs (harness does not allocate CPUs from this)
  - name: slurm-lammps
    cpus: 8
    memory_gb: 16
  # GROMACS via Docker (gromacs-solver run.sh uses GROMACS_DOCKER_IMAGE; harness does not allocate)
  - name: gromacs-docker
    cpus: 8
    memory_gb: 16
